# Generate a sample household and display the full output.
#
# Dispatch-only. Runs the full generation pipeline against the real
# SQLite distribution data shipped in data/ and displays the
# generated household as JSON.

name: Generate Household

on:
  workflow_dispatch:
    inputs:
      state:
        description: "State to generate for (must have SQLite data in data/)"
        required: false
        default: "HI"
        type: string
      year:
        description: "PUMS data year"
        required: false
        default: "2022"
        type: string
      pattern:
        description: "Household pattern (or 'random' to sample from distribution)"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - single_adult
          - single_parent
          - married_couple_no_children
          - married_couple_with_children
          - blended_family
          - multigenerational
          - unmarried_partners
          - other
      seed:
        description: "Random seed for reproducibility (leave empty for random)"
        required: false
        default: ""
        type: string
      run-tests:
        description: "Also run the generator test suite"
        required: false
        default: false
        type: boolean

jobs:
  generate:
    name: Generate household
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy sqlalchemy faker pytest Jinja2

      # ── Parameters ───────────────────────────────────────────────
      - name: Show parameters
        run: |
          echo "### Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| State | \`${{ inputs.state }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Year | \`${{ inputs.year }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pattern | \`${{ inputs.pattern }}\` |" >> "$GITHUB_STEP_SUMMARY"
          SEED="${{ inputs.seed }}"
          echo "| Seed | \`${SEED:-<random>}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run tests | \`${{ inputs.run-tests }}\` |" >> "$GITHUB_STEP_SUMMARY"
          COMMIT=$(git rev-parse --short HEAD)
          echo "| Commit | \`$COMMIT\` |" >> "$GITHUB_STEP_SUMMARY"
          STATE_LOWER=$(echo "${{ inputs.state }}" | tr '[:upper:]' '[:lower:]')
          DB_FILE="data/distributions_${STATE_LOWER}_${{ inputs.year }}.sqlite"
          if [ -f "$DB_FILE" ]; then
            SIZE=$(du -h "$DB_FILE" | cut -f1)
            echo "| Database | \`$DB_FILE\` ($SIZE) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Database | **NOT FOUND:** \`$DB_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"

      # ── Generate ─────────────────────────────────────────────────
      - name: Generate household
        run: |
          PATTERN="${{ inputs.pattern }}"
          SEED="${{ inputs.seed }}"
          STATE="${{ inputs.state }}"
          YEAR="${{ inputs.year }}"

          ARGS="--state $STATE --year $YEAR"
          if [ "$PATTERN" != "random" ]; then
            ARGS="$ARGS --pattern $PATTERN"
          fi
          if [ -n "$SEED" ]; then
            ARGS="$ARGS --seed $SEED"
          fi

          python scripts/generate_sample.py $ARGS --format json | tee /tmp/household.json

      # ── Display ────────────────────────────────────────────────
      - name: Display generated household
        run: |
          echo "### Generated Household" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Quick summary line
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          p = d['pattern']
          a = d['adult_count']
          c = d['child_count']
          s = d['filing_status']
          addr = d.get('address', {})
          addr_line = f\"{addr.get('street', '')}, {addr.get('city', '')}, {addr.get('state', '')} {addr.get('zip_code', '')}\"
          if addr.get('apt'):
              addr_line = f\"{addr.get('street', '')}, {addr.get('apt', '')}, {addr.get('city', '')}, {addr.get('state', '')} {addr.get('zip_code', '')}\"
          print(f'| Field | Value |')
          print(f'|-------|-------|')
          print(f'| State | {d[\"state\"]} ({d[\"year\"]}) |')
          print(f'| Pattern | \`{p}\` |')
          print(f'| Adults | {a} |')
          print(f'| Children | {c} |')
          print(f'| Filing status | {s} |')
          print(f'| Address | {addr_line} |')
          print(f'| Married | {d[\"is_married\"]} |')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Per-member table
          echo "#### Members" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          print('| # | Name | Relationship | Age | Sex | Race | Hispanic | SSN | DOB | Phone | ID Type | ID |')
          print('|---|------|-------------|-----|-----|------|----------|-----|-----|-------|---------|----|')
          for i, m in enumerate(d['members'], 1):
              name = f\"{m['legal_first_name']} {m.get('legal_middle_name', '')} {m['legal_last_name']}\"
              suffix = m.get('suffix', '')
              if suffix:
                  name += f' {suffix}'
              name = name.replace('  ', ' ')
              phone = m.get('phone', '') or '—'
              id_type = m.get('id_type', '') or '—'
              if id_type == 'drivers_license':
                  id_type = 'DL'
              elif id_type == 'state_id':
                  id_type = 'State ID'
              id_info = '—'
              if m.get('id_type'):
                  expired = ''
                  if m.get('id_expiry'):
                      from datetime import date
                      if date.fromisoformat(m['id_expiry']) < date.today():
                          expired = ' **(expired)**'
                  id_info = f\"\`{m['id_number']}\` exp {m.get('id_expiry', '—')}{expired}\"
              race = m.get('race', '—')
              hisp = 'Yes' if m.get('hispanic_origin') else 'No'
              print(f\"| {i} | {name} | {m['relationship']} | {m['age']} | {m['sex']} | {race} | {hisp} | \`{m['ssn']}\` | {m['dob']} | {phone} | {id_type} | {id_info} |\")
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Employment & income table
          echo "#### Employment & Income" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          print('| # | Name | Employment | Occupation | Wage | Interest | Dividends | SS | Retirement | Self-Emp | Total |')
          print('|---|------|-----------|-----------|------|----------|-----------|----|-----------|---------| ------|')
          for i, m in enumerate(d['members'], 1):
              name = f\"{m['legal_first_name']} {m['legal_last_name']}\"
              emp = m.get('employment_status', '—') or '—'
              occ = m.get('occupation_title', '—') or '—'
              if len(occ) > 25:
                  occ = occ[:22] + '...'
              total = m.get('total_income', 0)
              w2_total = sum(w.get('wages', 0) for w in m.get('w2s', []))
              interest = sum(f.get('interest_income', 0) for f in m.get('form_1099_ints', []))
              dividends = sum(f.get('ordinary_dividends', 0) for f in m.get('form_1099_divs', []))
              ss = m.get('ssa_1099', {})
              ss_amt = ss.get('net_benefits', 0) if ss else 0
              retirement = sum(f.get('gross_distribution', 0) for f in m.get('form_1099_rs', []))
              se = sum(f.get('nonemployee_compensation', 0) for f in m.get('form_1099_necs', []))
              fmt = lambda v: f'\${v:,}' if v else '—'
              print(f'| {i} | {name} | {emp} | {occ} | {fmt(w2_total)} | {fmt(interest)} | {fmt(dividends)} | {fmt(ss_amt)} | {fmt(retirement)} | {fmt(se)} | {fmt(total)} |')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Tax documents inventory
          echo "#### Tax Documents" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          docs = []
          for m in d['members']:
              name = f\"{m['legal_first_name']} {m['legal_last_name']}\"
              for w in m.get('w2s', []):
                  emp = w.get('employer', {})
                  emp_name = emp.get('name', '?') if emp else '?'
                  docs.append(f'| W-2 | {name} | {emp_name} | \${w[\"wages\"]:,} |')
              for f in m.get('form_1099_ints', []):
                  docs.append(f'| 1099-INT | {name} | {f[\"payer_name\"]} | \${f[\"interest_income\"]:,} |')
              for f in m.get('form_1099_divs', []):
                  docs.append(f'| 1099-DIV | {name} | {f[\"payer_name\"]} | \${f[\"ordinary_dividends\"]:,} |')
              for f in m.get('form_1099_rs', []):
                  docs.append(f'| 1099-R | {name} | {f[\"payer_name\"]} | \${f[\"gross_distribution\"]:,} |')
              if m.get('ssa_1099'):
                  s = m['ssa_1099']
                  docs.append(f'| SSA-1099 | {name} | SSA | \${s[\"net_benefits\"]:,} |')
              for f in m.get('form_1099_necs', []):
                  docs.append(f'| 1099-NEC | {name} | {f[\"payer_name\"]} | \${f[\"nonemployee_compensation\"]:,} |')
          if docs:
              print('| Form | Recipient | Payer | Amount |')
              print('|------|-----------|-------|--------|')
              for row in docs:
                  print(row)
          else:
              print('*No tax documents generated for this household.*')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Full JSON collapsible
          echo "<details><summary>Full household JSON</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          python -m json.tool /tmp/household.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      # ── Optional tests ───────────────────────────────────────────
      - name: Run Part 1 generator tests
        if: inputs.run-tests
        run: |
          echo "### Part 1: Demographics & PII" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_models.py \
                           tests/test_sampler.py \
                           tests/test_demographics.py \
                           tests/test_children.py \
                           tests/test_pipeline.py \
                           tests/test_pii.py \
                           tests/test_db.py \
                           -v --tb=short 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run Part 2 generator tests
        if: inputs.run-tests
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Part 2: Employment & Income" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_employment.py \
                           tests/test_income.py \
                           tests/test_extract_part2.py \
                           -v --tb=short 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run training module tests
        if: inputs.run-tests
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Training: Documents, Forms, Errors & Grading" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_document_renderer.py \
                           tests/test_form_populator.py \
                           tests/test_error_injector.py \
                           tests/test_grader.py \
                           -v --tb=short 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run integration tests
        if: inputs.run-tests
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Integration: End-to-End Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_exercise_engine.py \
                           tests/test_scenario_store.py \
                           tests/test_income_integration.py \
                           tests/test_multi_section_ui.py \
                           -v --tb=short 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Test summary
        if: inputs.run-tests && always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "### Full Test Suite Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/ --tb=no -q 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
