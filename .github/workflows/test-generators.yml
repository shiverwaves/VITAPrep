# Generate a sample household, render identity documents, and display
# the full output.
#
# Dispatch-only. Runs the full generation pipeline against the real
# SQLite distribution data shipped in data/, renders SSN cards and
# photo IDs via WeasyPrint, and uploads the PNGs as workflow artifacts.

name: Generate Household

on:
  workflow_dispatch:
    inputs:
      state:
        description: "State to generate for (must have SQLite data in data/)"
        required: false
        default: "HI"
        type: string
      year:
        description: "PUMS data year"
        required: false
        default: "2022"
        type: string
      pattern:
        description: "Household pattern (or 'random' to sample from distribution)"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - single_adult
          - single_parent
          - married_couple_no_children
          - married_couple_with_children
          - blended_family
          - multigenerational
          - unmarried_partners
          - other
      seed:
        description: "Random seed for reproducibility (leave empty for random)"
        required: false
        default: ""
        type: string
      render-docs:
        description: "Render SSN cards and photo IDs as PNG files"
        required: false
        default: true
        type: boolean
      run-tests:
        description: "Also run the generator test suite"
        required: false
        default: false
        type: boolean

jobs:
  generate:
    name: Generate household
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy sqlalchemy faker pytest
          if [ "${{ inputs.render-docs }}" = "true" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq libpango1.0-dev libharfbuzz-dev libffi-dev libjpeg-dev libopenjp2-7-dev
            pip install weasyprint Jinja2 Pillow
          fi

      # ── Parameters ───────────────────────────────────────────────
      - name: Show parameters
        run: |
          echo "### Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| State | \`${{ inputs.state }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Year | \`${{ inputs.year }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pattern | \`${{ inputs.pattern }}\` |" >> "$GITHUB_STEP_SUMMARY"
          SEED="${{ inputs.seed }}"
          echo "| Seed | \`${SEED:-<random>}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Render docs | \`${{ inputs.render-docs }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run tests | \`${{ inputs.run-tests }}\` |" >> "$GITHUB_STEP_SUMMARY"
          COMMIT=$(git rev-parse --short HEAD)
          echo "| Commit | \`$COMMIT\` |" >> "$GITHUB_STEP_SUMMARY"
          STATE_LOWER=$(echo "${{ inputs.state }}" | tr '[:upper:]' '[:lower:]')
          DB_FILE="data/distributions_${STATE_LOWER}_${{ inputs.year }}.sqlite"
          if [ -f "$DB_FILE" ]; then
            SIZE=$(du -h "$DB_FILE" | cut -f1)
            echo "| Database | \`$DB_FILE\` ($SIZE) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Database | **NOT FOUND:** \`$DB_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"

      # ── Generate ─────────────────────────────────────────────────
      - name: Generate household
        run: |
          PATTERN="${{ inputs.pattern }}"
          SEED="${{ inputs.seed }}"
          STATE="${{ inputs.state }}"
          YEAR="${{ inputs.year }}"

          ARGS="--state $STATE --year $YEAR"
          if [ "$PATTERN" != "random" ]; then
            ARGS="$ARGS --pattern $PATTERN"
          fi
          if [ -n "$SEED" ]; then
            ARGS="$ARGS --seed $SEED"
          fi

          python scripts/generate_sample.py $ARGS --format json | tee /tmp/household.json

      # ── Display ────────────────────────────────────────────────
      - name: Display generated household
        run: |
          echo "### Generated Household" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Quick summary line
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          p = d['pattern']
          a = d['adult_count']
          c = d['child_count']
          s = d['filing_status']
          addr = d.get('address', {})
          addr_line = f\"{addr.get('street', '')}, {addr.get('city', '')}, {addr.get('state', '')} {addr.get('zip_code', '')}\"
          if addr.get('apt'):
              addr_line = f\"{addr.get('street', '')}, {addr.get('apt', '')}, {addr.get('city', '')}, {addr.get('state', '')} {addr.get('zip_code', '')}\"
          print(f'| Field | Value |')
          print(f'|-------|-------|')
          print(f'| State | {d[\"state\"]} ({d[\"year\"]}) |')
          print(f'| Pattern | \`{p}\` |')
          print(f'| Adults | {a} |')
          print(f'| Children | {c} |')
          print(f'| Filing status | {s} |')
          print(f'| Address | {addr_line} |')
          print(f'| Married | {d[\"is_married\"]} |')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Per-member table
          echo "#### Members" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json
          d = json.load(open('/tmp/household.json'))
          print('| # | Name | Relationship | Age | Sex | Race | Hispanic | SSN | DOB | Phone | ID Type | ID |')
          print('|---|------|-------------|-----|-----|------|----------|-----|-----|-------|---------|----|')
          for i, m in enumerate(d['members'], 1):
              name = f\"{m['legal_first_name']} {m.get('legal_middle_name', '')} {m['legal_last_name']}\"
              suffix = m.get('suffix', '')
              if suffix:
                  name += f' {suffix}'
              name = name.replace('  ', ' ')
              phone = m.get('phone', '') or '—'
              id_type = m.get('id_type', '') or '—'
              if id_type == 'drivers_license':
                  id_type = 'DL'
              elif id_type == 'state_id':
                  id_type = 'State ID'
              id_info = '—'
              if m.get('id_type'):
                  expired = ''
                  if m.get('id_expiry'):
                      from datetime import date
                      if date.fromisoformat(m['id_expiry']) < date.today():
                          expired = ' **(expired)**'
                  id_info = f\"\`{m['id_number']}\` exp {m.get('id_expiry', '—')}{expired}\"
              race = m.get('race', '—')
              hisp = 'Yes' if m.get('hispanic_origin') else 'No'
              print(f\"| {i} | {name} | {m['relationship']} | {m['age']} | {m['sex']} | {race} | {hisp} | \`{m['ssn']}\` | {m['dob']} | {phone} | {id_type} | {id_info} |\")
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Full JSON collapsible
          echo "<details><summary>Full household JSON</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          python -m json.tool /tmp/household.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      # ── Render documents ────────────────────────────────────────
      - name: Render identity documents
        if: inputs.render-docs
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          from generator.models import Household, Person, Address, RelationshipType
          from training.document_renderer import DocumentRenderer
          from datetime import date

          d = json.load(open('/tmp/household.json'))

          # Reconstruct Household from JSON
          members = []
          for m in d['members']:
              addr = None
              if m.get('id_address'):
                  a = m['id_address']
                  addr = Address(street=a['street'], apt=a.get('apt'), city=a['city'], state=a['state'], zip_code=a['zip_code'])
              p = Person(
                  person_id=m['person_id'],
                  relationship=RelationshipType(m['relationship']),
                  age=m['age'],
                  sex=m['sex'],
                  race=m.get('race', ''),
                  legal_first_name=m['legal_first_name'],
                  legal_middle_name=m.get('legal_middle_name', ''),
                  legal_last_name=m['legal_last_name'],
                  suffix=m.get('suffix', ''),
                  ssn=m['ssn'],
                  dob=date.fromisoformat(m['dob']) if m.get('dob') else None,
                  id_type=m.get('id_type', ''),
                  id_state=m.get('id_state', ''),
                  id_number=m.get('id_number', ''),
                  id_expiry=date.fromisoformat(m['id_expiry']) if m.get('id_expiry') else None,
                  id_address=addr,
              )
              members.append(p)

          hh_addr = None
          if d.get('address'):
              a = d['address']
              hh_addr = Address(street=a['street'], apt=a.get('apt'), city=a['city'], state=a['state'], zip_code=a['zip_code'])

          hh = Household(
              household_id=d.get('household_id', 'hh-workflow'),
              state=d.get('state', 'HI'),
              year=d.get('year', 2022),
              pattern=d.get('pattern', ''),
              members=members,
              address=hh_addr,
          )

          renderer = DocumentRenderer(output_dir='/tmp/rendered_docs')
          paths = renderer.render_household_documents(hh)
          print(f'Rendered {len(paths)} documents')
          for label, path in sorted(paths.items()):
              print(f'  {label}: {path}')
          "

      - name: List rendered documents in summary
        if: inputs.render-docs
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "### Rendered Documents" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Document | File |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in /tmp/rendered_docs/*.pdf; do
            if [ -f "$f" ]; then
              NAME=$(basename "$f")
              SIZE=$(du -h "$f" | cut -f1)
              echo "| \`$NAME\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the rendered documents from the **Artifacts** section below." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rendered documents
        if: inputs.render-docs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-documents
          path: /tmp/rendered_docs/*.pdf
          retention-days: 14

      # ── Optional tests ───────────────────────────────────────────
      - name: Run generator tests
        if: inputs.run-tests
        run: |
          python -m pytest tests/test_models.py \
                           tests/test_sampler.py \
                           tests/test_demographics.py \
                           tests/test_children.py \
                           tests/test_pipeline.py \
                           tests/test_pii.py \
                           tests/test_db.py \
                           -v --tb=short

      - name: Test summary
        if: inputs.run-tests && always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "### Generator Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_models.py \
                           tests/test_sampler.py \
                           tests/test_demographics.py \
                           tests/test_children.py \
                           tests/test_pipeline.py \
                           tests/test_pii.py \
                           tests/test_db.py \
                           --tb=no -q 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
