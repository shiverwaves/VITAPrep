# Run generator unit tests on every push and PR.
#
# Tests use in-memory distribution tables (no SQLite download needed).
# TODO (Sprint 4): Add a "with PII" job that includes test_pii.py and
# installs Faker once the PII generator is implemented.

name: Test Generators

on:
  push:
    paths:
      - "generator/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/test-generators.yml"
  pull_request:
    paths:
      - "generator/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/test-generators.yml"
  workflow_dispatch:

jobs:
  # ── Core generator tests (no PII) ──────────────────────────────────
  test-generators:
    name: Generator tests (no PII)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pandas numpy sqlalchemy pytest

      - name: Run generator tests
        run: |
          python -m pytest tests/test_models.py \
                           tests/test_sampler.py \
                           tests/test_demographics.py \
                           tests/test_children.py \
                           tests/test_pipeline.py \
                           tests/test_db.py \
                           -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "### Generator Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Python ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_models.py \
                           tests/test_sampler.py \
                           tests/test_demographics.py \
                           tests/test_children.py \
                           tests/test_pipeline.py \
                           tests/test_db.py \
                           --tb=no -q 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
