# Lightweight workflow to report what distribution data exists in the repo.
#
# No downloads, no extraction — just opens the existing SQLite files and
# reports tables, row counts, state/year, and file sizes.
#
# Results appear in the GitHub Actions job summary (visible in the Actions UI).

name: Data Inventory

on:
  workflow_dispatch:
    inputs:
      format:
        description: "Output format"
        required: false
        default: "markdown"
        type: choice
        options:
          - markdown
          - text
          - json
  # Also run on pushes that modify data files, so the summary stays current
  push:
    paths:
      - "data/distributions_*.sqlite"

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run data inventory
        id: report
        run: |
          FORMAT="${{ inputs.format || 'markdown' }}"
          python scripts/data_inventory.py \
            --format "$FORMAT" \
            --github-summary

      - name: Print inventory to logs
        run: |
          echo "=== Distribution Data Inventory ==="
          python scripts/data_inventory.py --format text
          echo "==================================="
